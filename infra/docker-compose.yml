# Minimal stack: app + Postgres (checkpoints). No Redis for skeleton.
version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PG_CONNECTION_STRING=postgresql://venture:venture@postgres:5432/venture_studio
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    restart: unless-stopped
    networks:
      - studio

  postgres:
    image: ankane/pgvector:latest
    environment:
      - POSTGRES_USER=venture
      - POSTGRES_PASSWORD=venture
      - POSTGRES_DB=venture_studio
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venture -d venture_studio"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - studio

networks:
  studio:
    driver: bridge

volumes:
  postgres-data:
